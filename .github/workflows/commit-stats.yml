name: Update commit stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Calculate commits this month
        run: |
          COUNT=$(git rev-list --count --since="$(date +%Y-%m-01)" HEAD)

          echo "{\"schemaVersion\":1,\"label\":\"commits/month\",\"message\":\"$COUNT\",\"color\":\"blue\"}" > commit-stats.json

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add commit-stats.json
          git commit -m "update commit stats" || exit 0
          git push
